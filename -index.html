<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDCompta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#1a1a24;--s3:#22222f;
  --border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:#5a5a7a;--dim:#3a3a5a;
  --green:#00e5a0;--green-bg:rgba(0,229,160,0.06);--green-bd:rgba(0,229,160,0.2);
  --amber:#ffb830;--amber-bg:rgba(255,184,48,0.06);--amber-bd:rgba(255,184,48,0.2);
  --red:#ff4d6d;--red-bg:rgba(255,77,109,0.06);--red-bd:rgba(255,77,109,0.2);
  --blue:#4d9fff;--blue-bg:rgba(77,159,255,0.06);
  --pur:#b48eff;--pur-bg:rgba(180,142,255,0.1);--pur-bd:rgba(180,142,255,0.3);
  --syne:'Syne',sans-serif;--mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--syne);min-height:100vh;font-size:14px}
em{font-style:normal;color:var(--pur)}

/* Nav */
.nav{display:flex;align-items:center;gap:12px;background:var(--s1);border-bottom:1px solid var(--border);padding:0 1.5rem;position:sticky;top:0;z-index:100}
.nav-logo{font-weight:800;font-size:1.15rem;padding:1rem 0;margin-right:auto}
.sync{display:flex;align-items:center;gap:7px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.sync-dot.ok{background:var(--green);box-shadow:0 0 7px var(--green)}
.sync-dot.err{background:var(--red)}
.sync-status{font-family:var(--mono);font-size:9px;color:var(--muted)}

/* Boutons */
.btn{font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:8px 14px;border-radius:3px;cursor:pointer;border:1px solid;transition:all .15s;background:none;color:var(--text);border-color:var(--border)}
.btn:hover{border-color:var(--muted)}
.btn-p{background:var(--pur-bg);color:var(--pur);border-color:var(--pur-bd)}
.btn-p:hover{background:rgba(180,142,255,.2)}
.btn-g{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.btn-g:hover{background:rgba(0,229,160,.15)}

/* Layout */
.wrap{max-width:1200px;margin:0 auto;padding:1.5rem}
.sec{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:1.5rem 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.sec-actions{display:flex;gap:6px}

/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:4px}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;white-space:nowrap}
thead th{background:var(--s2);color:var(--muted);text-align:left;padding:8px 10px;font-weight:700;letter-spacing:.04em;border-bottom:1px solid var(--border);position:sticky;top:0}
tbody td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text)}
tbody tr:hover{background:var(--s1)}
.num{text-align:right}
.pos{color:var(--green)}.neg{color:var(--red)}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;background:var(--s3);color:var(--muted)}
.empty{padding:2rem;text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-bg.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:1.5rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-title{font-weight:700;font-size:1rem;margin-bottom:1rem}
.fld{margin-bottom:12px}
.lbl{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.inp{width:100%;font-family:var(--mono);font-size:13px;background:var(--s2);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:8px 10px}
.inp:focus{outline:none;border-color:var(--pur)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.hint{font-size:10px;color:var(--amber);margin-top:4px;font-family:var(--mono)}

/* Porte d'entrée (jeton) */
.gate{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.gate-card{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:2rem;max-width:380px;width:100%;text-align:center}
.gate-card h1{font-size:1.4rem;margin-bottom:.4rem}
.gate-card p{color:var(--muted);font-size:12px;margin-bottom:1.2rem;line-height:1.5}
.remember{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-family:var(--mono);font-size:10px;color:var(--muted)}
.hidden{display:none}
</style>
</head>
<body>

<!-- ====== PORTE D'ENTRÉE (jeton) ====== -->
<div id="gate" class="gate">
  <div class="gate-card">
    <h1>MD<em>Compta</em></h1>
    <p>Entre ta clé d'accès pour te connecter à ta comptabilité.</p>
    <div class="fld">
      <input class="inp" id="gate-token" type="password" placeholder="Clé d'accès" autocomplete="off">
    </div>
    <button class="btn btn-p" style="width:100%" onclick="connecter()">Se connecter</button>
    <label class="remember"><input type="checkbox" id="gate-remember" checked> Se souvenir sur cet appareil</label>
    <p id="gate-err" class="hint hidden" style="color:var(--red)"></p>
  </div>
</div>

<!-- ====== APPLICATION ====== -->
<div id="app" class="hidden">
  <div class="nav">
    <div class="nav-logo">MD<em>Compta</em></div>
    <div class="sync"><span class="sync-dot" id="dot"></span><span class="sync-status" id="status">…</span></div>
    <button class="btn" onclick="deconnecter()">Clé</button>
  </div>

  <div class="wrap">
    <div class="sec">
      Journal
      <div class="sec-actions">
        <button class="btn btn-g" onclick="reconstruire()">Reconstruire</button>
        <button class="btn btn-p" onclick="ouvrirModal()">+ Nouvelle écriture</button>
      </div>
    </div>

    <div class="tbl-wrap">
      <table id="journal">
        <thead><tr>
          <th>Date</th><th>Type</th><th>Sous-compte</th><th>Description</th>
          <th class="num">Montant</th><th class="num">Sous-total</th>
          <th class="num">TPS</th><th class="num">TVQ</th>
          <th class="num">Total</th><th class="num">Pour impôts</th>
        </tr></thead>
        <tbody id="journal-body">
          <tr><td colspan="10" class="empty">Chargement…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ====== MODAL : nouvelle écriture ====== -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">Nouvelle écriture</div>

    <div class="row2">
      <div class="fld">
        <label class="lbl">Date</label>
        <input class="inp" id="m-date" type="date">
      </div>
      <div class="fld">
        <label class="lbl">Type</label>
        <select class="inp" id="m-type">
          <option>Revenus</option><option>Dépenses</option><option>Transfert</option>
        </select>
      </div>
    </div>

    <div class="fld">
      <label class="lbl">Sous-compte</label>
      <select class="inp" id="m-souscompte"></select>
    </div>

    <div class="row2">
      <div class="fld">
        <label class="lbl">Compte financier</label>
        <select class="inp" id="m-compte"></select>
      </div>
      <div class="fld">
        <label class="lbl">Tiers</label>
        <input class="inp" id="m-tiers" type="text" placeholder="Fournisseur / client">
      </div>
    </div>

    <div class="fld">
      <label class="lbl">Description</label>
      <input class="inp" id="m-desc" type="text" placeholder="ex: Microsoft 365">
    </div>

    <div class="row2">
      <div class="fld">
        <label class="lbl">Montant</label>
        <input class="inp" id="m-montant" type="number" step="0.01" placeholder="ex: 114.98">
        <div class="hint" id="m-hint"></div>
      </div>
      <div class="fld">
        <label class="lbl">Base</label>
        <select class="inp" id="m-base">
          <option value="TTC">TTC (total)</option>
          <option value="ST">ST (sous-total)</option>
        </select>
      </div>
    </div>

    <div class="row2">
      <div class="fld">
        <label class="lbl">Type de taxe</label>
        <select class="inp" id="m-typetaxe">
          <option value="">Auto (selon sous-compte)</option>
          <option value="TX">TX — taxable</option>
          <option value="EX">EX — exonéré</option>
          <option value="ZR">ZR — détaxé</option>
          <option value="HT">HT — hors-taxe</option>
        </select>
      </div>
      <div class="fld">
        <label class="lbl">Pièce</label>
        <input class="inp" id="m-piece" type="text" placeholder="nº reçu (optionnel)">
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn" onclick="fermerModal()">Annuler</button>
      <button class="btn btn-p" id="m-save" onclick="enregistrer()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
/* ====== CONFIG ====== */
// Adresse du backend (ton déploiement Apps Script). Publique, non secrète.
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyah566jhOBMDOmubg09TNM6yshjwbTFFafPrZ8FWKLmpY896A8_j0urCfPympXPNg/exec';

let TOKEN = '';
let SOUSCOMPTES = {};   // { "5010": {nom, parent, ...}, ... }

/* ====== APPEL BACKEND (calqué sur gsApi de MDWheel : GET + {ok,data}) ====== */
async function gsApi(params){
  try{
    setStatus(null, 'Synchro…');
    const url = SCRIPT_URL + '?' + new URLSearchParams(Object.assign({token:TOKEN}, params)).toString();
    const res = await fetch(url);
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || 'Erreur');
    setStatus(true, '✓ Synchronisé');
    return data.data;
  }catch(e){
    setStatus(false, '⚠ ' + e.message);
    throw e;
  }
}

function setStatus(ok, msg){
  const dot = document.getElementById('dot');
  if(dot){ dot.className = 'sync-dot' + (ok===true?' ok':ok===false?' err':''); }
  const s = document.getElementById('status');
  if(s) s.textContent = msg;
}

/* ====== CONNEXION / JETON ====== */
async function connecter(){
  const t = document.getElementById('gate-token').value.trim();
  const err = document.getElementById('gate-err');
  err.classList.add('hidden');
  if(!t){ err.textContent='Entre ta clé.'; err.classList.remove('hidden'); return; }
  TOKEN = t;
  try{
    await gsApi({action:'ping'});                       // valide la clé
    if(document.getElementById('gate-remember').checked) localStorage.setItem('mdcompta_token', t);
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    await initApp();
  }catch(e){
    TOKEN='';
    err.textContent = (''+e.message).indexOf('autoris')>=0 ? 'Clé refusée.' : 'Connexion impossible : '+e.message;
    err.classList.remove('hidden');
  }
}

function deconnecter(){
  localStorage.removeItem('mdcompta_token');
  TOKEN='';
  document.getElementById('app').classList.add('hidden');
  document.getElementById('gate').classList.remove('hidden');
  document.getElementById('gate-token').value='';
}

/* ====== INIT ====== */
async function initApp(){
  const [sc, cf] = await Promise.all([
    gsApi({action:'getSousComptes'}),
    gsApi({action:'getComptesFinanciers'})
  ]);
  SOUSCOMPTES = sc || {};
  remplirSousComptes(sc);
  remplirComptes(cf);
  await chargerJournal();
}

function remplirSousComptes(sc){
  const sel = document.getElementById('m-souscompte');
  sel.innerHTML='';
  Object.keys(sc).sort().forEach(function(no){
    const o=document.createElement('option');
    o.value=no; o.textContent=no+' — '+sc[no].nom;
    sel.appendChild(o);
  });
}
function remplirComptes(cf){
  const sel = document.getElementById('m-compte');
  sel.innerHTML='';
  (cf||[]).forEach(function(nom){
    const o=document.createElement('option'); o.value=nom; o.textContent=nom; sel.appendChild(o);
  });
}

/* ====== JOURNAL ====== */
function fmt(n){
  if(n===''||n===null||n===undefined||isNaN(n)) return '';
  return Number(n).toLocaleString('fr-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function cls(n){ return Number(n)<0?'neg':Number(n)>0?'pos':''; }

async function chargerJournal(){
  const tb=document.getElementById('journal-body');
  try{
    const r = await gsApi({action:'getJournal', limite:200});
    const lignes = (r && r.lignes) || [];
    if(!lignes.length){ tb.innerHTML='<tr><td colspan="10" class="empty">Aucune écriture. Clique « + Nouvelle écriture » pour commencer.</td></tr>'; return; }
    tb.innerHTML='';
    lignes.reverse().forEach(function(l){
      const tr=document.createElement('tr');
      tr.innerHTML =
        '<td>'+(l.Date||'')+'</td>'+
        '<td><span class="tag">'+(l.Type||'')+'</span></td>'+
        '<td>'+(l.SousCompte||'')+'</td>'+
        '<td>'+(l.Description||'')+'</td>'+
        '<td class="num '+cls(l.Montant)+'">'+fmt(l.Montant)+'</td>'+
        '<td class="num">'+fmt(l.SousTotal)+'</td>'+
        '<td class="num">'+fmt(l.TPS)+'</td>'+
        '<td class="num">'+fmt(l.TVQ)+'</td>'+
        '<td class="num '+cls(l.Total)+'">'+fmt(l.Total)+'</td>'+
        '<td class="num">'+fmt(l.TotalImpots)+'</td>';
      tb.appendChild(tr);
    });
  }catch(e){
    tb.innerHTML='<tr><td colspan="10" class="empty">Erreur de chargement : '+e.message+'</td></tr>';
  }
}

async function reconstruire(){
  try{
    const r = await gsApi({action:'reconstruire'});
    setStatus(true, '✓ '+(r.recalculees||0)+' ligne(s) recalculée(s)');
    await chargerJournal();
  }catch(e){/* statut déjà affiché */}
}

/* ====== MODAL ====== */
function ouvrirModal(){
  document.getElementById('m-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('m-montant').value='';
  document.getElementById('m-desc').value='';
  document.getElementById('m-tiers').value='';
  document.getElementById('m-piece').value='';
  majHint();
  document.getElementById('modal').classList.add('show');
}
function fermerModal(){ document.getElementById('modal').classList.remove('show'); }

function majHint(){
  const type=document.getElementById('m-type').value;
  const h=document.getElementById('m-hint');
  if(type==='Dépenses') h.textContent='Sera enregistré en négatif.';
  else if(type==='Transfert') h.textContent='Mets − pour une sortie de fonds.';
  else h.textContent='';
}
document.getElementById('m-type').addEventListener('change', majHint);

async function enregistrer(){
  const btn=document.getElementById('m-save');
  let montant = parseFloat(document.getElementById('m-montant').value);
  if(isNaN(montant)){ alert('Entre un montant.'); return; }
  const type=document.getElementById('m-type').value;
  if(type==='Dépenses' && montant>0) montant=-montant;   // convention : dépenses en négatif

  const params={
    action:'ajouterEcriture',
    Date:document.getElementById('m-date').value,
    Type:type,
    Tiers:document.getElementById('m-tiers').value,
    CompteFinancier:document.getElementById('m-compte').value,
    Description:document.getElementById('m-desc').value,
    SousCompte:document.getElementById('m-souscompte').value,
    Montant:montant,
    Base:document.getElementById('m-base').value,
    TypeTaxe:document.getElementById('m-typetaxe').value,
    'Pièce':document.getElementById('m-piece').value
  };
  btn.disabled=true; btn.textContent='…';
  try{
    await gsApi(params);
    fermerModal();
    await chargerJournal();
  }catch(e){ alert('Erreur : '+e.message); }
  finally{ btn.disabled=false; btn.textContent='Enregistrer'; }
}

/* ====== DÉMARRAGE ====== */
window.addEventListener('DOMContentLoaded', async function(){
  const saved = localStorage.getItem('mdcompta_token');
  if(saved){
    document.getElementById('gate-token').value = saved;
    await connecter();
  }
});
</script>
</body>
</html>
